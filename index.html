<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mucklo Boy's Day — A Working Man's Journey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050507; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050507; }
#hud {
  position: fixed; top: 10px; left: 0; width: 100%;
  display: flex; justify-content: space-between; padding: 0 14px;
  color: #39ff14; font-size: 13px; font-family: 'Courier New', monospace;
  text-shadow: 0 0 8px #39ff14; z-index: 50; pointer-events: none;
  text-transform: uppercase; letter-spacing: 1px;
}
#jump-btn {
  position: fixed; bottom: 24px; right: 24px;
  width: 88px; height: 88px;
  background: rgba(57,255,20,0.12); border: 3px solid #39ff14; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #39ff14; font-size: 34px; font-weight: bold;
  cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none;
  box-shadow: 0 0 20px rgba(57,255,20,0.35), inset 0 0 15px rgba(57,255,20,0.08);
  text-shadow: 0 0 12px #39ff14; z-index: 100;
}
#jump-btn.pressed {
  background: rgba(57,255,20,0.35);
  box-shadow: 0 0 40px rgba(57,255,20,0.8), inset 0 0 20px rgba(57,255,20,0.25);
}
#tool-hud {
  position: fixed; bottom: 124px; right: 24px; min-width: 88px;
  color: #ffcc00; font-size: 10px; font-family: 'Courier New', monospace;
  text-align: center; text-shadow: 0 0 8px #ffcc00; z-index: 50; pointer-events: none;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="container"><canvas id="game"></canvas></div>
<div id="hud">
  <span id="hud-score">SCORE: 0</span>
  <span id="hud-level">LV1: DAWN RIDE</span>
  <span id="hud-lives">♥♥♥</span>
</div>
<div id="tool-hud"></div>
<button id="jump-btn" aria-label="Jump">▲</button>

<script>
// ═══════════════════════════════════════════════
//  MUCKLO BOY'S DAY  —  8-bit Side Scroller
// ═══════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

const GY = () => H * 0.76; // ground y

// ── AUDIO ──────────────────────────────────────
let AC;
function initAudio() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }

function tone(freq, dur, type = 'square', vol = 0.22, startFreq) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  o.frequency.setValueAtTime(startFreq || freq, AC.currentTime);
  if (startFreq) o.frequency.exponentialRampToValueAtTime(freq, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

function sfxJump() { tone(500, 0.14, 'square', 0.2, 280); }
function sfxCollect() { [523,659,784].forEach((f,i) => tone(f, 0.09, 'square', 0.18, undefined)); [523,659,784].forEach((f,i) => setTimeout(()=>tone(f,0.09,'square',0.18), i*70)); }
function sfxHurt() { tone(90, 0.3, 'square', 0.35, 220); }
function sfxLevelUp() { [523,659,784,1047].forEach((f,i) => setTimeout(()=>tone(f,0.13,'square',0.22),i*110)); }
function sfxSmash() { tone(120, 0.15, 'sawtooth', 0.3, 350); }

// Background music
let musicTimer = null;
const TUNES = [
  [[262,330,392,523],[294,370,440,587],[349,440,523,659]],
  [[220,277,330,415],[196,247,294,370],[165,208,247,330]],
  [[349,440,523,698],[392,494,587,740],[440,554,659,880]],
  [[196,247,294,392],[175,220,262,349],[165,208,247,330]],
];
let musicStep = 0, musicChord = 0, musicLevel = 0;

function startMusic(lv) {
  stopMusic(); musicStep = 0; musicChord = 0; musicLevel = lv;
  function tick() {
    if (!AC) return;
    const pat = TUNES[Math.min(lv, TUNES.length-1)];
    const note = pat[musicChord % pat.length][musicStep % 4];
    tone(note, 0.09, 'square', 0.04);
    // bass
    if (musicStep % 4 === 0) tone(note / 2, 0.18, 'square', 0.03);
    musicStep++;
    if (musicStep % 8 === 0) musicChord++;
    musicTimer = setTimeout(tick, 135);
  }
  musicTimer = setTimeout(tick, 50);
}
function stopMusic() { if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; } }

// ── PIXEL ART HELPERS ──────────────────────────
const PX = 3; // 1 "game pixel" = 3 real pixels

function p(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.floor(x), Math.floor(y), w * PX, h * PX);
}

// Character pixel dimensions
const CW = 13 * PX; // 39px
const CH = 22 * PX; // 66px

// Draw Mucklo Boy at screen coords (sx, sy)
// frame: 0,1,2 = walk; 3 = jump; 4 = hurt
function drawMucklo(sx, sy, frame, alpha) {
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  const b = (fx, fy, fw, fh, c) => p(sx + fx * PX, sy + fy * PX, fw, fh, c);

  // Hat (blue cap)
  b(3, 0, 6, 1, '#3366ee'); b(2, 1, 7, 1, '#2255cc'); b(1, 2, 8, 1, '#1a44bb'); // brim
  // Pom on hat
  b(8, 0, 2, 1, '#88aaff');

  // Hair
  b(2, 2, 1, 3, '#222'); b(9, 2, 1, 3, '#222'); b(2, 2, 8, 1, '#222');

  // Head (skin)
  b(3, 3, 6, 4, '#ffcc99'); b(2, 4, 1, 2, '#ffcc99'); b(9, 4, 1, 2, '#ffcc99');

  // Eyes — round with whites
  b(4, 4, 1, 2, '#fff'); b(7, 4, 1, 2, '#fff');
  b(4, 4, 1, 1, '#222'); b(7, 4, 1, 1, '#222'); // pupils
  b(4, 5, 1, 1, '#fff'); b(7, 5, 1, 1, '#fff');

  // O-mouth (surprised)
  b(5, 6, 2, 1, '#553'); b(5, 7, 2, 1, '#553');
  b(4, 6, 1, 2, '#553'); b(7, 6, 1, 2, '#553');
  b(5, 6, 2, 2, '#331100'); // interior dark

  // Neck
  b(5, 7, 2, 1, '#ffcc99');

  // Red sweater
  b(1, 8, 10, 5, '#cc2200'); b(2, 8, 8, 5, '#dd3311');
  b(4, 8, 4, 1, '#aa1100'); // collar V

  // Yellow toolbox / satchel (right side — his right = screen right)
  b(10, 8, 3, 4, '#ffcc00'); b(10, 11, 3, 1, '#cc9900');
  b(11, 9, 1, 2, '#cc9900'); // handle cutout
  b(11, 8, 1, 1, '#886600'); // latch

  // Left arm
  const laY = (frame === 1) ? 7 : 8;
  b(0, laY, 2, 3, '#cc2200');
  // Right arm
  b(11, 8, 2, 3, '#cc2200');

  // Blue shorts
  b(2, 13, 8, 3, '#2244cc'); b(3, 14, 6, 2, '#1a33aa');

  // Legs + socks + shoes — vary by frame
  if (frame === 3) { // jump: legs tucked
    b(2, 16, 3, 3, '#ffddbb'); b(7, 16, 3, 3, '#ffddbb');
    b(2, 18, 3, 1, '#fff');    b(7, 18, 3, 1, '#fff');
    b(1, 19, 4, 2, '#cc2200'); b(6, 19, 4, 2, '#cc2200');
  } else if (frame === 4) { // hurt: same as jump
    b(2, 16, 3, 3, '#ffddbb'); b(7, 16, 3, 3, '#ffddbb');
    b(2, 19, 3, 1, '#fff');    b(7, 19, 3, 1, '#fff');
    b(1, 20, 4, 2, '#cc2200'); b(6, 20, 4, 2, '#cc2200');
  } else if (frame === 0) { // stride A
    b(2, 16, 3, 2, '#ffddbb'); b(1, 18, 3, 2, '#ffddbb');
    b(6, 16, 3, 2, '#ffddbb'); b(7, 18, 3, 2, '#ffddbb');
    b(1, 19, 3, 1, '#fff');    b(7, 19, 3, 1, '#fff');
    b(0, 20, 4, 2, '#cc2200'); b(7, 20, 4, 2, '#cc2200');
  } else if (frame === 1) { // mid-stride
    b(3, 16, 3, 4, '#ffddbb'); b(6, 16, 3, 4, '#ffddbb');
    b(3, 19, 3, 1, '#fff');    b(6, 19, 3, 1, '#fff');
    b(2, 20, 4, 2, '#cc2200'); b(6, 20, 4, 2, '#cc2200');
  } else { // frame 2: stride B
    b(2, 16, 3, 2, '#ffddbb'); b(3, 18, 3, 2, '#ffddbb');
    b(6, 16, 3, 2, '#ffddbb'); b(5, 18, 3, 2, '#ffddbb');
    b(3, 19, 3, 1, '#fff');    b(5, 19, 3, 1, '#fff');
    b(2, 20, 4, 2, '#cc2200'); b(5, 20, 4, 2, '#cc2200');
  }

  ctx.globalAlpha = 1;
}

// Draw wife (pixel figure, facing left)
function drawWife(sx, sy) {
  const b = (fx, fy, fw, fh, c) => p(sx + fx * PX, sy + fy * PX, fw, fh, c);
  // Hair (pink bob)
  b(1, 0, 5, 1, '#ee44aa'); b(0, 1, 6, 2, '#cc2288'); b(0, 3, 1, 3, '#cc2288'); b(5, 3, 1, 3, '#cc2288');
  // Head
  b(1, 1, 4, 4, '#ffcc99'); b(0, 2, 1, 2, '#ffcc99'); b(5, 2, 1, 2, '#ffcc99');
  // Eyes
  b(1, 2, 1, 1, '#222'); b(4, 2, 1, 1, '#222');
  // Smile
  b(2, 4, 2, 1, '#553');
  b(1, 3, 1, 1, '#553'); b(4, 3, 1, 1, '#553');
  // Dress (teal)
  b(0, 5, 6, 5, '#44aacc'); b(0, 8, 7, 2, '#33889a');
  // Arms
  b(-1, 5, 1, 3, '#ffcc99'); b(6, 5, 1, 3, '#ffcc99');
}

// ── GAME STATE ─────────────────────────────────
const ST = { TITLE:'title', CRASH:'crash', PLAY:'play', TRANSITION:'transition', DEAD:'dead', GAMEOVER:'gameover', ENDING:'ending' };
let state = ST.TITLE;

let score = 0;
let lives = 3;
let level = 0;
let fc = 0; // frame counter
let scrollX = 0;
let distInLevel = 0;
const LEVEL_LEN = [3200, 3500, 3500, 3800];
const SCROLL_SPEED = [2.2, 2.5, 2.6, 3.0];
let spd = SCROLL_SPEED[0];

const LEVEL_NAMES = ['LV1: DAWN RIDE', 'LV2: CITY COMMUTE', 'LV3: NIGHT SHIFT OVER', 'LV4: DARK ROAD HOME'];

// Bike crash intro state
let crashIntro = false, crashT = 0, crashLanded = false, crashGrassBonus = false;

// Player
let pl = {};
function resetPlayer() {
  pl = {
    x: 80, y: 0,
    vy: 0, onGround: false,
    walkFrame: 0, walkT: 0,
    jumps: 0, maxJumps: 1,
    tool: null, toolTimer: 0,
    invincible: 0,
    alive: true,
  };
  pl.y = GY() - CH;
}

// Obstacles, pickups, particles
let obs = [], picks = [], parts = [];
let nextObsAt = 350, nextPickAt = 280;
let goalReached = false;
let titleT = 0, transT = 0, deathT = 0, endT = 0, endPhase = 0;

// ── LEVEL THEMES ───────────────────────────────
const THEMES = [
  // LV1: Pre-dawn country road
  { sky0:'#020210', sky1:'#0a0820', gnd:'#1a2a10', gndLine:'#39ff14', accent:'#39ff14', win:'#ffff44', country:true },
  // LV2: City commute to factory, early morning
  { sky0:'#0a0818', sky1:'#1a1028', gnd:'#1a1830', gndLine:'#ff8c00', accent:'#ff8c00', win:'#ffcc44', country:false },
  // LV3: Night city after shift
  { sky0:'#050510', sky1:'#0a0818', gnd:'#120820', gndLine:'#ff3cac', accent:'#ff3cac', win:'#ff88ff', country:false },
  // LV4: Dark country return
  { sky0:'#010108', sky1:'#050510', gnd:'#0a1508', gndLine:'#00e5ff', accent:'#00e5ff', win:'#88ddff', country:true },
];

// ── OBSTACLE DEFINITIONS ───────────────────────
function makeObs(lv, wx) {
  const gy = GY();
  const r = Math.random();

  if (lv === 0) {
    // Country morning: potholes, hippies, puddles
    if (r < 0.35) return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-0.8, hp:1, bobT:0 };
    if (r < 0.55) return { type:'pothole', x:wx, y:gy-7, w:38, h:10, vx:0, hp:1, col:'#443322' };
    if (r < 0.75) return { type:'cone', x:wx, y:gy-28, w:14, h:28, vx:0, hp:1 };
    return { type:'pothole', x:wx, y:gy-7, w:30, h:10, vx:0, hp:1, col:'#443322', extra:{ type:'hippie', x:wx+100, y:gy-50, origY:gy-50, w:22, h:50, vx:-0.6, hp:1, bobT:0 } };
  }
  if (lv === 1) {
    // City commute: hippies, cars, protest signs
    if (r < 0.3) return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-0.9, hp:1, bobT:0 };
    if (r < 0.5) return { type:'car', x:wx, y:gy-38, w:64, h:36, vx:-1.4, hp:1, col:'#8866aa', col2:'#665588' };
    if (r < 0.7) return { type:'sign', x:wx, y:gy-70, w:18, h:13, vx:-2.5, vy:0, hp:1, phase:Math.random()*6.28 };
    return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-1.0, hp:1, bobT:0,
             extra:{ type:'sign', x:wx+80, y:gy-80, w:18, h:13, vx:-2.8, vy:0, hp:1, phase:2 } };
  }
  if (lv === 2) {
    // Night city after shift: more aggressive hippies, cars
    if (r < 0.3) return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-1.2, hp:1, bobT:0 };
    if (r < 0.5) return { type:'car', x:wx, y:gy-38, w:72, h:36, vx:-1.8, hp:1, col:'#ff3cac', col2:'#cc2299' };
    if (r < 0.7) return { type:'vending', x:wx, y:gy-56, w:22, h:56, vx:0, hp:1 };
    return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-1.4, hp:1, bobT:0 };
  }
  // lv 3: dark country return — hippies in the dark, potholes
  if (r < 0.35) return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-1.3, hp:1, bobT:0 };
  if (r < 0.55) return { type:'pothole', x:wx, y:gy-7, w:50, h:10, vx:0, hp:1, col:'#332211' };
  if (r < 0.75) return { type:'car', x:wx, y:gy-38, w:64, h:36, vx:-2.0, hp:1, col:'#00e5ff', col2:'#0088aa' };
  return { type:'hippie', x:wx, y:gy-50, origY:gy-50, w:22, h:50, vx:-1.5, hp:1, bobT:0 };
}

function makePick(wx) {
  const tools = ['wrench','hammer','thermos'];
  const tool = tools[Math.floor(Math.random() * 3)];
  const cols = { wrench:'#aaaaaa', hammer:'#887755', thermos:'#cc6633' };
  return { tool, x:wx, y:GY()-70, w:20, h:20, col:cols[tool], bobT:Math.random()*6.28, done:false };
}

// ── INIT LEVEL ─────────────────────────────────
function initLevel(lv) {
  level = lv;
  obs = []; picks = []; parts = [];
  scrollX = 0; distInLevel = 0;
  nextObsAt = 380; nextPickAt = 300;
  goalReached = false;
  spd = SCROLL_SPEED[Math.min(lv, SCROLL_SPEED.length-1)];
  resetPlayer();
  updateHUD();
  startMusic(lv);
}

function initGame() {
  score = 0; lives = 3;
  // Start with bike crash intro
  crashIntro = true; crashT = 0; crashLanded = false; crashGrassBonus = false;
  initLevel(0);
  state = ST.CRASH;
}

// ── PARTICLES ──────────────────────────────────
function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) parts.push({
    x, y, vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6-2,
    life:1, col, sz: 2+Math.random()*5
  });
}

// ── DRAW HELPERS ───────────────────────────────
function drawCar(x, y, w, h, col, col2) {
  // Body
  ctx.fillStyle = col; ctx.fillRect(x, y+h*.35, w, h*.65);
  // Roof
  ctx.fillStyle = col2; ctx.fillRect(x+w*.12, y, w*.76, h*.42);
  // Windows
  ctx.fillStyle = '#001133';
  ctx.fillRect(x+w*.15, y+2, w*.28, h*.3);
  ctx.fillRect(x+w*.50, y+2, w*.28, h*.3);
  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x+3, y+h*.72, w*.28, h*.28);
  ctx.fillRect(x+w*.68, y+h*.72, w*.28, h*.28);
  ctx.fillStyle = '#444';
  ctx.fillRect(x+6, y+h*.76, 5, 5); ctx.fillRect(x+w*.72, y+h*.76, 5, 5);
  // Headlights
  ctx.fillStyle = '#ffee88';
  ctx.globalAlpha = 0.7 + Math.sin(fc*.15)*.3;
  ctx.fillRect(x-4, y+h*.48, 5, 6);
  ctx.globalAlpha = 1;
}

function drawPuddle(x, y, w, h, col) {
  ctx.fillStyle = col; ctx.globalAlpha = 0.72;
  ctx.fillRect(x+4, y, w-8, h);
  ctx.fillRect(x, y+2, w, h-4);
  ctx.globalAlpha = .25; ctx.fillStyle='#fff';
  ctx.fillRect(x+7, y+2, 10, 2);
  ctx.globalAlpha = 1;
}

function drawCone(x, y, w, h) {
  const segs = 4;
  for (let s=0; s<segs; s++) {
    const sw = w*(1-s/segs), sx = x+(w-sw)/2;
    ctx.fillStyle = s%2===0 ? '#ff8800' : '#eeeeee';
    ctx.fillRect(Math.floor(sx), Math.floor(y+s*(h/segs)), Math.ceil(sw), Math.ceil(h/segs));
  }
  ctx.fillStyle='#333'; ctx.fillRect(x-2, y+h-3, w+4, 3);
}

function drawHippie(x, y, w, h) {
  // Long hair (messy)
  ctx.fillStyle='#886622'; ctx.fillRect(x, y, w, h*.25);
  ctx.fillRect(x-2, y+3, 3, h*.35); ctx.fillRect(x+w-1, y+3, 3, h*.35);
  // Headband
  ctx.fillStyle='#ff4444'; ctx.fillRect(x, y+h*.12, w, 3);
  // Head
  ctx.fillStyle='#eebb88'; ctx.fillRect(x+2, y+h*.08, w-4, h*.28);
  // Squinty eyes
  ctx.fillStyle='#333';
  ctx.fillRect(x+4, y+h*.18, 4, 2); ctx.fillRect(x+w-8, y+h*.18, 4, 2);
  // Grin
  ctx.fillStyle='#663300';
  ctx.fillRect(x+5, y+h*.28, w-10, 2);
  // Tie-dye shirt
  ctx.fillStyle='#ff6600'; ctx.fillRect(x, y+h*.38, w, h*.32);
  ctx.fillStyle='#ffcc00'; ctx.fillRect(x+2, y+h*.42, 4, h*.12);
  ctx.fillStyle='#66cc66'; ctx.fillRect(x+w-6, y+h*.42, 4, h*.12);
  // Bell-bottom jeans
  ctx.fillStyle='#5566aa'; ctx.fillRect(x, y+h*.7, w, h*.3);
  ctx.fillRect(x-2, y+h*.85, 3, h*.15); ctx.fillRect(x+w-1, y+h*.85, 3, h*.15);
  // Peace sign on shirt
  ctx.fillStyle='#fff';
  ctx.fillRect(x+w/2-1, y+h*.4, 2, 8);
  ctx.fillRect(x+w/2-4, y+h*.44, 8, 2);
  // Protest sign (held up)
  ctx.fillStyle='#ddcc88'; ctx.fillRect(x-8, y-15, 18, 14);
  ctx.fillStyle='#cc2200'; ctx.font='5px monospace'; ctx.textAlign='center';
  ctx.fillText('NO', x+1, y-6);
  ctx.fillText('WORK', x+1, y-1);
  // Sign stick
  ctx.fillStyle='#886644'; ctx.fillRect(x, y-1, 2, h*.4);
}

function drawPothole(x, y, w, h, col) {
  ctx.fillStyle = col || '#443322'; ctx.globalAlpha = 0.85;
  ctx.fillRect(x+3, y, w-6, h);
  ctx.fillRect(x, y+2, w, h-4);
  ctx.globalAlpha = .35; ctx.fillStyle='#111';
  ctx.fillRect(x+5, y+2, w-10, h-4);
  ctx.globalAlpha = 1;
}

function drawSign(x, y, w, h) {
  // Flying protest sign
  ctx.fillStyle='#eecc88'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle='#cc0000'; ctx.font='5px monospace'; ctx.textAlign='center';
  ctx.fillText('DOWN', x+w/2, y+5);
  ctx.fillText('W/MAN', x+w/2, y+10);
  ctx.fillStyle='#886644'; ctx.fillRect(x+w/2-1, y+h, 2, 8);
}

function drawPaper(x, y, w, h) {
  drawSign(x, y, w, h);
}

function drawVending(x, y, w, h) {
  ctx.fillStyle='#440055'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle='#770099'; ctx.fillRect(x+2, y+2, w-4, h-4);
  // Glowing screen
  ctx.fillStyle='#ff00ff'; ctx.globalAlpha=0.7+Math.sin(fc*.08)*.3;
  ctx.fillRect(x+3, y+4, w-6, h*.32);
  // Evil face
  ctx.fillStyle='#ff3cac';
  ctx.fillRect(x+5, y+6, 3, 3); ctx.fillRect(x+w-8, y+6, 3, 3);
  ctx.fillStyle='#ff0000';
  ctx.fillRect(x+4, y+12, w-8, 2);
  ctx.fillRect(x+4, y+10, 2, 2); ctx.fillRect(x+w-6, y+10, 2, 2);
  ctx.globalAlpha=1;
  // Buttons
  ctx.fillStyle='#ffcc00';

// ── BACKGROUND ─────────────────────────────────
function drawBG(lv) {
  const gy = GY();
  const th = THEMES[lv];

  // Sky
  const g = ctx.createLinearGradient(0,0,0,gy);
  g.addColorStop(0, th.sky0); g.addColorStop(1, th.sky1);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,gy);

  // Stars (country levels 0,3 and night city lv2)
  if (lv !== 1) {
    for (let i=0;i<50;i++) {
      const sx=(Math.sin(i*137.5)*.5+.5)*W, sy=(Math.cos(i*97.3)*.5+.5)*gy*.75;
      const blink = Math.sin(fc*.04+i)>.4 ? 1 : .4;
      ctx.fillStyle='#fff'; ctx.globalAlpha=.45*blink;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
    }
    ctx.globalAlpha=1;
  }

  // Moon (lv 0,3) or sunrise (lv 1)
  if (lv===0 || lv===3) {
    ctx.fillStyle='#ffffcc'; ctx.globalAlpha=.9;
    ctx.fillRect(W*.8, 24, 28, 28);
    ctx.fillStyle=th.sky0; ctx.fillRect(W*.8+18, 29, 8, 8); // crater
    ctx.globalAlpha=1;
  } else if (lv===1) {
    // Sunrise on horizon
    const sunG = ctx.createRadialGradient(W*.85,gy*.7,2,W*.85,gy*.7,80);
    sunG.addColorStop(0,'rgba(255,180,50,0.5)'); sunG.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=sunG; ctx.fillRect(W*.85-80,gy*.7-80,160,160);
    ctx.fillStyle='#ffaa22'; ctx.globalAlpha=.6;
    ctx.fillRect(W*.85-8, gy*.7-8, 16, 16); ctx.globalAlpha=1;
  }

  // Parallax background: country = trees/fields, city = buildings
  if (th.country) {
    // Country: rolling hills, scattered trees
    for (let layer=0;layer<2;layer++) {
      const parallax = layer===0 ? 0.15 : 0.35;
      const alpha = layer===0 ? 0.4 : 0.7;
      ctx.globalAlpha = alpha;
      for (let i=0;i<12;i++) {
        const seed = i*3017 + lv*500 + layer*211;
        const tx = ((i*100 - scrollX*parallax) % (W+140) + W+140) % (W+140) - 70;
        const th2 = 18 + seed%30;
        // Tree trunk
        ctx.fillStyle = '#2a1a08';
        ctx.fillRect(Math.floor(tx+6), gy-th2, 5, th2);
        // Tree canopy
        ctx.fillStyle = layer===0 ? '#0a2a08' : '#0d3310';
        const cw = 16+seed%14;
        ctx.fillRect(Math.floor(tx+8-cw/2), gy-th2-cw*.7, cw, Math.floor(cw*.7));
        // Grass patches
        if (i%3===0) {
          ctx.fillStyle='#1a3a10';
          ctx.fillRect(Math.floor(tx-8), gy-4, 30, 4);
        }
      }
      ctx.globalAlpha=1;
    }
  } else {
    // City: buildings
    for (let layer=0;layer<2;layer++) {
      const parallax = layer===0 ? 0.25 : 0.5;
      const alpha = layer===0 ? 0.55 : 0.85;
      ctx.globalAlpha = alpha;
      for (let i=0;i<10;i++) {
        const seed = i*5023 + lv*1000 + layer*317;
        const bw = 38 + seed%40, bh = 35 + seed%90;
        const bx = ((i*115 - scrollX*parallax) % (W+120) + W+120) % (W+120) - 60;
        const by = gy - bh;
        ctx.fillStyle = layer===0 ? '#0a0a18' : '#0d0d22';
        ctx.fillRect(Math.floor(bx), Math.floor(by), bw, bh);
        // Windows
        ctx.fillStyle = th.win;
        const wc=Math.floor(bw/11), wr=Math.floor(bh/12);
        for (let r=0;r<wr;r++) for (let c=0;c<wc;c++) {
          if ((seed+r*7+c*3)%3!==0)
            ctx.fillRect(Math.floor(bx+c*11+2), Math.floor(by+r*12+3), 7, 7);
        }
      }
      ctx.globalAlpha=1;
    }
  }

  // Ground
  ctx.fillStyle=th.gnd; ctx.fillRect(0, gy, W, H-gy);
  // Neon ground line
  ctx.fillStyle=th.accent; ctx.fillRect(0, gy, W, 3);
  // Ground dashes
  ctx.fillStyle=th.accent; ctx.globalAlpha=.18;
  const dashOff = scrollX % 55;
  for (let dx=-dashOff; dx<W; dx+=55)
    ctx.fillRect(Math.floor(dx), gy+(H-gy)*.4, 32, 2);
  ctx.globalAlpha=1;

  // Road markings
  ctx.fillStyle='#ffff44'; ctx.globalAlpha=.12;
  const rOff = scrollX % 90;
  for (let dx=-rOff; dx<W; dx+=90)
    ctx.fillRect(Math.floor(dx), gy+10, 50, 3);
  ctx.globalAlpha=1;

  // Grass patches on country levels
  if (th.country) {
    ctx.fillStyle='#2a5a18'; ctx.globalAlpha=.3;
    const grassOff = scrollX % 120;
    for (let dx=-grassOff; dx<W; dx+=120)
      ctx.fillRect(Math.floor(dx), gy+2, 40, 5);
    ctx.globalAlpha=1;
  }
}

// ── GOAL ───────────────────────────────────────
function drawAndCheckGoal() {
  const lvLen = LEVEL_LEN[Math.min(level, LEVEL_LEN.length-1)];
  if (distInLevel < lvLen - 500) return;
  const progress = (distInLevel - (lvLen-500)) / 400;
  const gx = Math.max(40, W - progress * (W - 160));
  const gy = GY();

  if (level === 0) {
    // Edge of town — road into city
    ctx.fillStyle='#1a1a2a'; ctx.fillRect(gx, gy-60, 80, 60);
    ctx.fillStyle='#ff8c00'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('CITY LIMITS', gx+40, gy-45);
    ctx.fillStyle='#ffcc00'; ctx.globalAlpha=.5+Math.sin(fc*.1)*.5;
    ctx.fillRect(gx+30, gy-70, 20, 8);
    ctx.globalAlpha=1;
  } else if (level === 1) {
    // Factory building — clock in
    ctx.fillStyle='#1a1a3a'; ctx.fillRect(gx, gy-130, 100, 130);
    ctx.fillStyle='#ff8c00'; ctx.globalAlpha=.9;
    ctx.font='8px monospace'; ctx.textAlign='center';
    ctx.fillText('MUCKLO WORKS CO.', gx+50, gy-118);
    ctx.globalAlpha=1;
    // Windows
    ctx.fillStyle='#ffff88'; ctx.globalAlpha=.7;
    for (let wr=0;wr<4;wr++) for (let wc=0;wc<4;wc++)
      ctx.fillRect(gx+8+wc*22, gy-110+wr*24, 16, 18);
    ctx.globalAlpha=1;
    // Door
    ctx.fillStyle='#885522'; ctx.fillRect(gx+36, gy-38, 28, 38);
    ctx.fillStyle='#aa6633'; ctx.fillRect(gx+38, gy-36, 12, 32); ctx.fillRect(gx+52, gy-36, 10, 32);
    // Clock
    ctx.fillStyle='#fff'; ctx.fillRect(gx+40, gy-140, 20, 20);
    ctx.fillStyle='#333'; ctx.fillRect(gx+49, gy-138, 2, 8); ctx.fillRect(gx+49, gy-134, 6, 2);
  } else if (level === 2) {
    // Exit sign — leaving the city
    ctx.fillStyle='#005500'; ctx.fillRect(gx, gy-50, 70, 30);
    ctx.fillStyle='#00ff00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('EXIT ▶', gx+35, gy-30);
    ctx.fillStyle='#39ff14'; ctx.globalAlpha=.5+Math.sin(fc*.12)*.5;
    ctx.fillRect(gx+28, gy-80, 14, 26);
    ctx.globalAlpha=1;
  } else {
    // The trailer — HOME!
    drawTrailerGoal(gx, gy-90);
  }

  // Check if player reaches it
  const goalSX = gx;
  if (!goalReached && pl.x + CW > goalSX - 20) {
    goalReached = true;
    stopMusic();
    sfxLevelUp();
    state = ST.TRANSITION;
    transT = 0;
  }
}

// ── RENDER OBSTACLES ───────────────────────────
function renderObs() {
  for (const o of obs) {
    if (o.hp<=0) continue;
    const sx = Math.floor(o.x - scrollX);
    if (sx > W+60 || sx+o.w < -40) continue;
    switch(o.type) {
      case 'car':     drawCar(sx, o.y, o.w, o.h, o.col, o.col2); break;
      case 'puddle':  drawPuddle(sx, o.y, o.w, o.h, o.col); break;
      case 'pothole': drawPothole(sx, o.y, o.w, o.h, o.col); break;
      case 'cone':    drawCone(sx, o.y, o.w, o.h); break;
      case 'hippie':  drawHippie(sx, o.y, o.w, o.h); break;
      case 'paper':   drawPaper(sx, o.y, o.w, o.h); break;
      case 'sign':    drawSign(sx, o.y, o.w, o.h); break;
      case 'vending': drawVending(sx, o.y, o.w, o.h); break;
    }
  }
}

function renderPicks() {
  for (const pk of picks) {
    if (pk.done) continue;
    const sx = Math.floor(pk.x - scrollX);
    if (sx > W+60 || sx+pk.w < -40) continue;
    pk.bobT += 0.055;
    const by = pk.y + Math.sin(pk.bobT)*6;
    // Glow
    ctx.fillStyle = pk.col; ctx.globalAlpha = 0.18+Math.sin(pk.bobT*2)*.08;
    ctx.fillRect(sx-5, by-5, pk.w+10, pk.h+10);
    ctx.globalAlpha=1;
    // Icon
    switch(pk.tool) {
      case 'wrench': drawWrenchIcon(sx, by); break;
      case 'hammer': drawHammerIcon(sx, by); break;
      case 'thermos': drawThermosIcon(sx, by); break;
    }
    // Label
    const lbls = { wrench:'SLOW', hammer:'SMASH', thermos:'DBLJ' };
    ctx.fillStyle=pk.col; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText(lbls[pk.tool], sx+pk.w/2, by-5);
  }
}

function renderParts() {
  for (const pt of parts) {
    ctx.fillStyle=pt.col; ctx.globalAlpha=pt.life;
    ctx.fillRect(Math.floor(pt.x), Math.floor(pt.y), Math.ceil(pt.sz), Math.ceil(pt.sz));
  }
  ctx.globalAlpha=1;
}

// ── UPDATE ─────────────────────────────────────
function updatePlay() {
  const gy = GY();
  const slowFactor = (pl.tool==='wrench') ? 0.38 : 1;

  // Scroll
  const dx = spd;
  scrollX += dx;
  distInLevel += dx;
  score += Math.round(dx * 0.8);

  // Spawn
  const curLevelLen = LEVEL_LEN[Math.min(level, LEVEL_LEN.length-1)];
  if (distInLevel < curLevelLen - 200) {
    if (distInLevel > nextObsAt) {
      const o = makeObs(level, scrollX + W + 60);
      if (o.extra) { obs.push(o.extra); delete o.extra; }
      obs.push(o);
      nextObsAt = distInLevel + 160 + Math.random()*240;
      if (Math.random()<.28) {
        const o2 = makeObs(level, scrollX + W + 210);
        obs.push(o2);
      }
    }
    if (distInLevel > nextPickAt) {
      picks.push(makePick(scrollX + W + 80));
      nextPickAt = distInLevel + 380 + Math.random()*280;
    }
  }

  // Update obstacles
  for (const o of obs) {
    if (o.hp<=0) continue;
    o.x += o.vx * slowFactor;
    if (o.type==='paper' || o.type==='sign') {
      o.phase += 0.055;
      o.y = (o.y + Math.sin(o.phase)*2.2);
    }
    if (o.type==='hippie') {
      o.bobT += 0.06;
      o.y = o.origY + Math.sin(o.bobT)*8;
    }
  }
  obs = obs.filter(o => o.x - scrollX > -200 && o.hp > 0);
  picks = picks.filter(p => p.x - scrollX > -100);

  // Player gravity
  if (!pl.onGround) pl.vy += 0.58;
  pl.y += pl.vy;
  if (pl.y + CH >= gy) {
    pl.y = gy - CH; pl.vy = 0; pl.onGround = true; pl.jumps = 0;
  }

  // Walk anim
  if (pl.onGround) {
    pl.walkT++;
    if (pl.walkT > 7) { pl.walkT=0; pl.walkFrame=(pl.walkFrame+1)%3; }
  }

  // Invincibility
  if (pl.invincible>0) pl.invincible--;

  // Tool timer
  if (pl.toolTimer>0) {
    pl.toolTimer--;
    if (pl.toolTimer<=0) { pl.tool=null; pl.maxJumps=1; updateToolHUD(); }
  }

  // Collisions
  if (pl.invincible===0) {
    const px=pl.x+4, py=pl.y+4, pw=CW-8, ph=CH-4;

    for (const o of obs) {
      if (o.hp<=0) continue;
      const ox=o.x-scrollX;
      if (ox+o.w<px || ox>px+pw) continue;
      if (o.y+o.h<py || o.y>py+ph) continue;
      // Hit!
      if (pl.tool==='hammer') {
        o.hp=0; score+=50; sfxSmash();
        burst(ox+o.w/2, o.y+o.h/2, '#ffaa00', 10);
        continue;
      }
      lives--; pl.invincible=130; sfxHurt();
      burst(pl.x+CW/2, pl.y+CH/2, '#ff3cac', 8);
      updateHUD();
      if (lives<=0) {
        pl.alive=false; state=ST.DEAD; deathT=0; stopMusic();
      }
      break;
    }

    for (const pk of picks) {
      if (pk.done) continue;
      const px2=pk.x-scrollX;
      if (px2+pk.w<px || px2>px+pw) continue;
      if (pk.y+pk.h<py || pk.y>py+ph) continue;
      pk.done=true; score+=100; sfxCollect();
      burst(px2+pk.w/2, pk.y+pk.h/2, pk.col, 12);
      pl.tool=pk.tool; pl.toolTimer=360;
      if (pk.tool==='thermos') pl.maxJumps=2;
      updateToolHUD();
    }
  }

  // Particles
  for (const pt of parts) { pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=.18; pt.life-=.028; }
  parts = parts.filter(pt=>pt.life>0);

  updateHUD();
}

// ── HUD ────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-score').textContent = 'SCORE: '+score;
  document.getElementById('hud-level').textContent = LEVEL_NAMES[level];
  document.getElementById('hud-lives').textContent = '♥'.repeat(Math.max(0,lives)) + '♡'.repeat(Math.max(0,3-lives));
}
function updateToolHUD() {
  const el = document.getElementById('tool-hud');
  if (!pl.tool) { el.textContent=''; return; }
  const n = { wrench:'SLOW-MO', hammer:'SMASH!', thermos:'CAFFEINE!' };
  const pct = Math.ceil(pl.toolTimer/360*100);
  el.textContent = n[pl.tool]+'\n['+pct+'%]';
}

  ctx.fillStyle='#fff'; ctx.font=`${Math.floor(Math.min(W*.028,16))}px monospace`;

  ctx.fillText('SCORE: '+score, W/2, H*.61);

  if (deathT>80 && Math.floor(deathT/28)%2===0) {
    ctx.fillStyle='#ffcc00'; ctx.font=`${Math.floor(Math.min(W*.032,18))}px monospace`;
    ctx.fillText('TAP / SPACE TO RETRY', W/2, H*.76);
  }
}

function drawEnding() {
  endT++;
  const gy = GY();

  if (endPhase===0) {
    // Fade in to house scene
    ctx.fillStyle='#050507'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = Math.max(0, 1-endT/50);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    if (endT>50) endPhase=1;
    return;
  }

  // Night sky background
  const skyG = ctx.createLinearGradient(0,0,0,gy);
  skyG.addColorStop(0,'#010108'); skyG.addColorStop(1,'#050520');
  ctx.fillStyle=skyG; ctx.fillRect(0,0,W,gy);

  // Stars
  for (let i=0;i<70;i++) {
    const sx=(Math.sin(i*137.5)*.5+.5)*W, sy=(Math.cos(i*97.3)*.5+.5)*gy*.8;
    ctx.fillStyle='#fff'; ctx.globalAlpha=.2+Math.sin(endT*.03+i)*.3;
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
  }
  ctx.globalAlpha=1;

  // Moon
  ctx.fillStyle='#ffffcc'; ctx.globalAlpha=.95;
  ctx.fillRect(W*.78, 28, 32, 32);
  ctx.fillStyle='#010108'; ctx.fillRect(W*.78+20, 33, 10, 10);
  ctx.globalAlpha=1;

  // Ground
  ctx.fillStyle='#101520'; ctx.fillRect(0, gy, W, H-gy);
  ctx.fillStyle='#00e5ff'; ctx.fillRect(0, gy, W, 3);

  // Trailer (centered-right)
  const hx = W*.48, hy = gy-90;
  drawTrailerGoal(hx, hy);

  // Mucklo walking toward house
  const walkProgress = Math.min(1, (endT-50)/200);
  const targetX = hx-CW-15;
  const muckloX = W*.05 + walkProgress * (targetX - W*.05);
  drawMucklo(muckloX, gy-CH, Math.floor(endT/9)%3);

  // Wife appears at door
  if (walkProgress > 0.85) {
    const arrT = (walkProgress-0.85)/0.15;

    // Hearts
    if (endT%18<3) burst(hx+20, hy+72, '#ff3cac', 2);
    renderParts();

    // Speech bubble from wife
    ctx.globalAlpha = Math.min(1, arrT*3);
    ctx.fillStyle='#fff'; ctx.fillRect(hx-5, hy+40, 90, 22);
    ctx.fillStyle='#ff3cac'; ctx.font='8px monospace'; ctx.textAlign='left';
    ctx.fillText("WELCOME HOME! ♥", hx-1, hy+55);
    ctx.globalAlpha=1;
  }

  // Particle hearts update
  for (const pt of parts) { pt.x+=pt.vx*.5; pt.y+=pt.vy*.7; pt.vy+=.08; pt.life-=.018; }

  if (endPhase===1 && walkProgress>=1) endPhase=2;

  if (endPhase===2) {
    // Final fade + credits
    const fadeT = Math.min(1, (endT-330)/70);
    ctx.fillStyle='#000'; ctx.globalAlpha=fadeT; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;

    if (fadeT>=1) {
      ctx.fillStyle='#050507'; ctx.fillRect(0,0,W,H);

      ctx.fillStyle='#ff3cac'; ctx.shadowColor='#ff3cac'; ctx.shadowBlur=20;
      ctx.font=`bold ${Math.floor(Math.min(W*.09,50))}px monospace`; ctx.textAlign='center';
      ctx.fillText('YOU DID IT!', W/2, H*.22);
      ctx.shadowBlur=0;

      ctx.fillStyle='#ffcc00'; ctx.font=`${Math.floor(Math.min(W*.04,22))}px monospace`;
      ctx.fillText('Mucklo made it home.', W/2, H*.36);

      ctx.fillStyle='#fff'; ctx.font=`${Math.floor(Math.min(W*.03,16))}px monospace`;
      ctx.fillText('His wife was waiting at the trailer door.', W/2, H*.44);
      ctx.fillText('The baby finally stopped crying.', W/2, H*.50);
      ctx.fillText('The toolbox never let him down.', W/2, H*.56);

      ctx.fillStyle='#39ff14'; ctx.shadowColor='#39ff14'; ctx.shadowBlur=12;
      ctx.font=`${Math.floor(Math.min(W*.038,20))}px monospace`;
      ctx.fillText('FINAL SCORE: '+score, W/2, H*.67);
      ctx.shadowBlur=0;

      // Pulsing heart
      const hp = 1+Math.sin(endT*.08)*.12;
      ctx.save(); ctx.translate(W/2, H*.8); ctx.scale(hp,hp);
      ctx.fillStyle='#ff3cac'; ctx.shadowColor='#ff3cac'; ctx.shadowBlur=18;
      ctx.font=`${Math.floor(Math.min(W*.1,56))}px monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('♥', 0, 0);
      ctx.restore(); ctx.shadowBlur=0;

      if (endT>450 && Math.floor(endT/28)%2===0) {
        ctx.fillStyle='#00e5ff'; ctx.font=`${Math.floor(Math.min(W*.025,14))}px monospace`; ctx.textAlign='center';
        ctx.fillText('TAP / SPACE TO PLAY AGAIN', W/2, H*.95);
      }
    }
  }
}

// ── BIKE CRASH INTRO ──────────────────────────
function drawBike(bx, by, angle) {
  ctx.save();
  ctx.translate(bx, by);
  if (angle) ctx.rotate(angle);
  // Wheels
  ctx.fillStyle='#444'; ctx.fillRect(-12, 4, 10, 10); ctx.fillRect(12, 4, 10, 10);
  ctx.fillStyle='#666'; ctx.fillRect(-10, 6, 6, 6); ctx.fillRect(14, 6, 6, 6);
  // Frame
  ctx.fillStyle='#888'; ctx.fillRect(-4, -2, 18, 3);
  ctx.fillRect(-2, -8, 3, 10); ctx.fillRect(12, -6, 3, 8);
  // Handlebars
  ctx.fillStyle='#aaa'; ctx.fillRect(10, -10, 8, 3);
  // Seat
  ctx.fillStyle='#553'; ctx.fillRect(-4, -10, 8, 3);
  ctx.restore();
}

function drawCrashIntro() {
  crashT++;
  const gy = GY();

  // Draw country background
  drawBG(0);

  if (crashT < 60) {
    // Phase 1: Mucklo riding bike, hits pothole
    const bikeX = W * 0.3 + crashT * 1.5;
    const bikeY = gy - 20;
    drawBike(bikeX, bikeY, 0);
    drawMucklo(bikeX - 8, bikeY - CH - 6, Math.floor(crashT/6)%3);

    // Pothole ahead
    ctx.fillStyle='#332211';
    ctx.fillRect(W*0.6, gy-5, 40, 8);
    ctx.fillStyle='#111'; ctx.globalAlpha=0.6;
    ctx.fillRect(W*0.6+5, gy-3, 30, 4);
    ctx.globalAlpha=1;

    // Text
    ctx.fillStyle='#ffcc00'; ctx.font=`bold ${Math.floor(Math.min(W*.04,20))}px monospace`; ctx.textAlign='center';
    ctx.fillText('BEFORE DAWN...', W/2, H*0.15);
    ctx.fillStyle='#fff'; ctx.font=`${Math.floor(Math.min(W*.025,13))}px monospace`;
    ctx.fillText('Mucklo rides to work in the dark.', W/2, H*0.22);
  } else if (crashT < 120) {
    // Phase 2: CRASH! Mucklo flies off bike
    const crashProgress = (crashT - 60) / 60;
    const bikeX = W * 0.6;
    const bikeAngle = crashProgress * 1.2;
    drawBike(bikeX, gy - 15, bikeAngle);

    // Mucklo flying through air
    const flyX = bikeX - 20 + crashProgress * 60;
    const flyY = gy - CH - 10 - Math.sin(crashProgress * Math.PI) * 120;
    drawMucklo(flyX, flyY, 4);

    // Impact stars
    if (crashT === 61) burst(bikeX, gy - 10, '#ffcc00', 20);
    renderParts();
    for (const pt of parts) { pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=.18; pt.life-=.028; }
    parts = parts.filter(pt=>pt.life>0);

    // CRASH text
    const flashAlpha = 0.6 + Math.sin(crashT*0.3)*0.4;
    ctx.fillStyle='#ff3cac'; ctx.globalAlpha=flashAlpha;
    ctx.shadowColor='#ff3cac'; ctx.shadowBlur=20;
    ctx.font=`bold ${Math.floor(Math.min(W*.12,64))}px monospace`; ctx.textAlign='center';
    ctx.fillText('CRASH!', W/2, H*0.3);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  } else {
    // Phase 3: Landing — tap to land in grass
    const landT = crashT - 120;
    const muckloY = Math.min(gy - CH, gy - CH - 80 + landT * 3);

    // Grass patches highlighted
    const grassPulse = 0.4 + Math.sin(crashT*0.15)*0.3;
    ctx.fillStyle='#44cc22'; ctx.globalAlpha=grassPulse;
    ctx.fillRect(W*0.35, gy-6, 50, 8);
    ctx.fillRect(W*0.55, gy-6, 45, 8);
    ctx.globalAlpha=1;

    if (!crashLanded) {
      drawMucklo(W*0.45, muckloY, 3);

      // Prompt to tap
      if (Math.floor(crashT/18)%2===0) {
        ctx.fillStyle='#39ff14'; ctx.shadowColor='#39ff14'; ctx.shadowBlur=12;
        ctx.font=`bold ${Math.floor(Math.min(W*.035,18))}px monospace`; ctx.textAlign='center';
        ctx.fillText('TAP NOW TO LAND IN GRASS!', W/2, H*0.2);
        ctx.shadowBlur=0;
      }
      ctx.fillStyle='#aaa'; ctx.font=`${Math.floor(Math.min(W*.02,11))}px monospace`; ctx.textAlign='center';
      ctx.fillText('+1 LIFE IF YOU LAND IN THE GRASS', W/2, H*0.26);

      // Auto-land after a while
      if (landT > 100) {
        crashLanded = true;
        crashGrassBonus = false;
      }
    } else {
      // Landed
      drawMucklo(W*0.45, gy-CH, 1);

      if (crashGrassBonus) {
        ctx.fillStyle='#39ff14'; ctx.shadowColor='#39ff14'; ctx.shadowBlur=15;
        ctx.font=`bold ${Math.floor(Math.min(W*.05,26))}px monospace`; ctx.textAlign='center';
        ctx.fillText('GRASS LANDING! +1 LIFE!', W/2, H*0.2);
        ctx.shadowBlur=0;
        // Green sparkles
        if (landT%4===0) burst(W*0.45+CW/2, gy-5, '#44cc22', 3);
      } else {
        ctx.fillStyle='#ffcc00'; ctx.font=`bold ${Math.floor(Math.min(W*.04,20))}px monospace`; ctx.textAlign='center';
        ctx.fillText('OUCH! HARD LANDING...', W/2, H*0.2);
      }

      renderParts();
      for (const pt of parts) { pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=.18; pt.life-=.028; }
      parts = parts.filter(pt=>pt.life>0);

      if (landT > 60) {
        // Transition to gameplay
        state = ST.PLAY;
        crashIntro = false;
        parts = [];
      }
    }
  }
}

// ── GAME OVER SCENE (wife leaves) ─────────────
function drawGameOverScene() {
  const gy = GY();

  // Dark scene
  ctx.fillStyle='#050510'; ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle='#101510'; ctx.fillRect(0,gy,W,H-gy);
  ctx.fillStyle='#333'; ctx.fillRect(0,gy,W,2);

  // The trailer in background
  const tx = W*0.6;
  ctx.fillStyle='#2a2018'; ctx.fillRect(tx, gy-60, 90, 60);
  ctx.fillStyle='#444'; ctx.fillRect(tx-2, gy-64, 94, 5);
  ctx.fillStyle='#cc8844'; ctx.fillRect(tx, gy-42, 90, 3);
  // Dark windows (lights off)
  ctx.fillStyle='#111'; ctx.fillRect(tx+8, gy-52, 16, 12); ctx.fillRect(tx+30, gy-52, 16, 12);
  // Open door
  ctx.fillStyle='#221100'; ctx.fillRect(tx+60, gy-48, 20, 48);

  const gameOverT = fc; // use global frame counter for animation

  // Wife walking away with suitcase toward car
  const wifeProgress = Math.min(1, (gameOverT % 400) / 200);
  const wifeX = tx + 40 - wifeProgress * (tx - 40);
  drawWife(wifeX, gy - 34);

  // Suitcase
  ctx.fillStyle='#885544'; ctx.fillRect(wifeX + 22, gy-22, 12, 14);
  ctx.fillStyle='#664433'; ctx.fillRect(wifeX + 24, gy-24, 8, 3);

  // Baby (small bundle)
  ctx.fillStyle='#ffddcc'; ctx.fillRect(wifeX - 6, gy-30, 6, 6);
  ctx.fillStyle='#aaddee'; ctx.fillRect(wifeX - 7, gy-28, 8, 5);

  // Stranger's car waiting on the left
  drawCar(30, gy-32, 56, 30, '#556677', '#445566');
  // Headlights on
  ctx.fillStyle='#ffee88'; ctx.globalAlpha=0.6+Math.sin(gameOverT*.1)*.3;
  ctx.fillRect(88, gy-22, 8, 6);
  ctx.globalAlpha=1;

  // Mucklo standing at trailer door, sad
  if (wifeProgress > 0.3) {
    const mSadX = tx + 55;
    drawMucklo(mSadX, gy-CH, 4);
    // Tear
    ctx.fillStyle='#4488ff';
    ctx.fillRect(mSadX + 5*PX, gy-CH + 6*PX + Math.floor(Math.sin(gameOverT*.1)*2), PX, PX*2);
  }

  // Text
  ctx.fillStyle='#ff3cac'; ctx.shadowColor='#ff3cac'; ctx.shadowBlur=18;
  ctx.font=`bold ${Math.floor(Math.min(W*.09,48))}px monospace`; ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H*.18);
  ctx.shadowBlur=0;

  ctx.fillStyle='#fff'; ctx.font=`${Math.floor(Math.min(W*.025,14))}px monospace`;
  ctx.fillText("Mucklo didn't make it home.", W/2, H*.28);
  ctx.fillText("She packed her bags...", W/2, H*.33);
  ctx.fillText("...took the baby and left.", W/2, H*.38);

  ctx.fillStyle='#aaa'; ctx.font=`${Math.floor(Math.min(W*.022,12))}px monospace`;
  ctx.fillText('SCORE: '+score, W/2, H*.46);

  if (Math.floor(gameOverT/28)%2===0) {
    ctx.fillStyle='#ffcc00'; ctx.font=`${Math.floor(Math.min(W*.032,18))}px monospace`;
    ctx.fillText('TAP / SPACE TO TRY AGAIN', W/2, H*.92);
  }
}

// ── WRENCH SLOW-MO OVERLAY ─────────────────────
function drawSlowOverlay() {
  if (pl.tool !== 'wrench') return;
  ctx.fillStyle='#00e5ff';
  ctx.globalAlpha=0.04+Math.sin(fc*.12)*.02;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}

// ── MAIN LOOP ──────────────────────────────────
function loop() {
  fc++;
  ctx.clearRect(0,0,W,H);
  ctx.textBaseline='alphabetic';

  switch(state) {
    case ST.TITLE:
      drawTitle();
      break;

    case ST.CRASH:
      drawCrashIntro();
      break;

    case ST.PLAY:
      updatePlay();
      drawBG(level);
      drawAndCheckGoal();
      renderObs();
      renderPicks();
      renderParts();
      drawSlowOverlay();
      // Player (flicker when invincible)
      if (pl.invincible===0 || Math.floor(fc/5)%2===0) {
        const fr = pl.onGround ? pl.walkFrame : 3;
        drawMucklo(pl.x, pl.y, fr);
      }
      updateToolHUD();
      break;

    case ST.TRANSITION:
      drawTransition();
      break;

    case ST.DEAD:
      drawDead();
      break;

    case ST.GAMEOVER:
      drawGameOverScene();
      break;

    case ST.ENDING:
      drawEnding();
      break;
  }

  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────
function jump() {
  initAudio();
  if (pl.jumps < pl.maxJumps) {
    pl.vy = pl.jumps===0 ? -13 : -10.5;
    pl.onGround=false; pl.jumps++;
    sfxJump();
  }
}

function action() {
  initAudio();
  switch(state) {
    case ST.TITLE:
      state=ST.PLAY; initGame(); break;
    case ST.PLAY:
      jump(); break;
    case ST.CRASH:
      if (crashT > 30) {
        // Tap during crash to land in grass for bonus
        if (!crashLanded) {
          crashLanded = true;
          crashGrassBonus = true;
          lives = Math.min(lives + 1, 5);
          sfxCollect();
          burst(pl.x+CW/2, GY()-CH/2, '#44cc22', 15);
          updateHUD();
        }
      }
      break;
    case ST.TRANSITION:
      if (transT < 70) return;
      if (level < 3) {
        initLevel(level+1); state=ST.PLAY;
      } else {
        state=ST.ENDING; endT=0; endPhase=0;
        parts=[];
      }
      break;
    case ST.DEAD:
      if (deathT < 60) return;
      if (lives > 0) {
        // Retry same level with remaining lives
        initLevel(level); state=ST.PLAY;
      } else {
        state=ST.GAMEOVER;
      }
      break;
    case ST.GAMEOVER:
      state=ST.TITLE; break;
    case ST.ENDING:
      if (endT > 400 && endPhase===2) {
        state=ST.TITLE; endT=0; endPhase=0;
      }
      break;
  }
}

window.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') { e.preventDefault(); action(); }
});

const jb = document.getElementById('jump-btn');
jb.addEventListener('touchstart', e => { e.preventDefault(); jb.classList.add('pressed'); action(); }, {passive:false});
jb.addEventListener('touchend',   e => { e.preventDefault(); jb.classList.remove('pressed'); }, {passive:false});
jb.addEventListener('mousedown',  e => { e.preventDefault(); action(); });

canvas.addEventListener('touchstart', e => { e.preventDefault(); action(); }, {passive:false});
canvas.addEventListener('mousedown', () => action());

// Kick off
updateHUD();
requestAnimationFrame(loop);
</script>
